<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rust Quiz</title>
<link rel="stylesheet" href="style.css">
<style>
body{font-family:'Poppins',sans-serif;padding:20px;background:#f5f5f5;}
.container{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
h1{text-align:center;} h3{margin-top:20px;} label{display:block;margin:5px 0;}
button{margin-top:20px;padding:10px 20px;font-size:16px;border-radius:5px;background:#4CAF50;color:white;border:none;cursor:pointer;}
a{display:inline-block;margin-bottom:20px;color:#333;text-decoration:none;}
</style>
</head>
<body>
<div class="container">
<a href="quiz.html">← Back to Quiz Selection</a>
<h1>Rust Quiz</h1>
<div id="quizContainer"></div>
</div>
<script>
const rustQuiz=[
{q:"Rust developed by?",options:["Mozilla","Microsoft","Apple","Google"],answer:0},
{q:"Rust is ___ language?",options:["Systems programming","Scripting","Web","Database"],answer:0},
{q:"Memory safety feature?",options:["Ownership","Garbage Collection","Pointers","Manual"],answer:0},
{q:"Keyword to define variable?",options:["let","var","const","val"],answer:0},
{q:"Mutable variable keyword?",options:["mut","let","var","const"],answer:0},
{q:"Function definition keyword?",options:["fn","function","def","func"],answer:0},
{q:"Loop keyword for range?",options:["for","while","loop","repeat"],answer:0},
{q:"Conditional keyword?",options:["if","when","switch","case"],answer:0},
{q:"Struct definition?",options:["struct","class","object","type"],answer:0},
{q:"Enum definition?",options:["enum","type","struct","class"],answer:0},
{q:"To handle errors?",options:["Result","Option","Try","Catch"],answer:0},
{q:"Trait keyword?",options:["trait","interface","abstract","class"],answer:0},
{q:"Macro definition?",options:["macro_rules!","macro","func","define"],answer:0},
{q:"Reference symbol?",options:["&","*","^","$"],answer:0},
{q:"Dereference symbol?",options:["*","&","^","$"],answer:0},
{q:"Ownership transfer?",options:["Move","Copy","Clone","Assign"],answer:0},
{q:"Mutable reference symbol?",options:["&mut","&","*","$"],answer:0},
{q:"Pattern matching keyword?",options:["match","switch","case","if"],answer:0},
{q:"Loop to repeat forever?",options:["loop","for","while","repeat"],answer:0},
{q:"Rust package manager?",options:["Cargo","NPM","Gem","Pip"],answer:0}
];
const container=document.getElementById('quizContainer');
rustQuiz.forEach((item,index)=>{
const qDiv=document.createElement('div');
qDiv.innerHTML=`<h3>Q${index+1}: ${item.q}</h3>${item.options.map((opt,i)=>`<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label>`).join('')}<hr>`;
container.appendChild(qDiv);
});
const submitBtn=document.createElement('button');
submitBtn.textContent="Submit Quiz";
submitBtn.onclick=()=>{
let score=0;
rustQuiz.forEach((item,index)=>{
const radios=document.getElementsByName('q'+index);
radios.forEach(r=>{if(r.checked && parseInt(r.value)===item.answer)score++;});
});
alert(`Your Rust Quiz Score: ${score} / ${rustQuiz.length}`);
};
container.appendChild(submitBtn);
</script>
</body>
</html>
