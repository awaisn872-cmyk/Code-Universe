<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>React Quiz</title>
<link rel="stylesheet" href="style.css">
<style>
body{font-family:'Poppins',sans-serif;padding:20px;background:#f5f5f5;}
.container{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
h1{text-align:center;}
h3{margin-top:20px;}
label{display:block;margin:5px 0;}
button{margin-top:20px;padding:10px 20px;font-size:16px;border-radius:5px;background:#4CAF50;color:white;border:none;cursor:pointer;}
a{display:inline-block;margin-bottom:20px;color:#333;text-decoration:none;}
</style>
</head>

<body>
<div class="container">
<a href="quiz.html">← Back to Quiz Selection</a>
<h1>React Quiz</h1>
<div id="quizContainer"></div>
</div>

<script>
const reactQuiz = [
{q:"React developed by?",options:["Facebook","Google","Microsoft","Twitter"],answer:0},
{q:"React is a ___?",options:["JavaScript Library","Framework","Language","Database"],answer:0},
{q:"File extension used in React?",options:[".jsx",".js",".react",".html"],answer:0},
{q:"React uses ___ architecture?",options:["Component-based","MVC","Monolithic","Layered"],answer:0},
{q:"Which command creates React app?",options:["npx create-react-app","npm start react","react-create-app","npm react-app"],answer:0},
{q:"Which method renders UI?",options:["render()","display()","show()","print()"],answer:0},
{q:"JSX stands for?",options:["JavaScript XML","Java Syntax","JSON XML","JavaScript Xtreme"],answer:0},
{q:"Which hook manages state?",options:["useState","useEffect","useRef","useContext"],answer:0},
{q:"Which hook handles lifecycle?",options:["useEffect","useState","useMemo","useReducer"],answer:0},
{q:"Props are ___?",options:["Read-only","Writable","Mutable","Private"],answer:0},
{q:"State is ___?",options:["Mutable","Immutable","Static","Fixed"],answer:0},
{q:"Which is correct component?",options:["function App(){}","component App(){}","def App()","class App[]"],answer:0},
{q:"Key is used in?",options:["Lists","Forms","Hooks","CSS"],answer:0},
{q:"Virtual DOM purpose?",options:["Performance","Security","Design","Routing"],answer:0},
{q:"Which hook shares data globally?",options:["useContext","useState","useEffect","useRef"],answer:0},
{q:"Controlled component uses?",options:["State","Props","DOM","Redux"],answer:0},
{q:"Which package handles routing?",options:["react-router-dom","react-route","router-js","react-navigation"],answer:0},
{q:"Redux is used for?",options:["State management","Routing","Styling","Testing"],answer:0},
{q:"Which hook memoizes value?",options:["useMemo","useEffect","useState","useRef"],answer:0},
{q:"React runs mainly on?",options:["Client-side","Server-side","Database","Compiler"],answer:0}
];

const container=document.getElementById('quizContainer');

reactQuiz.forEach((item,index)=>{
  const qDiv=document.createElement('div');
  qDiv.innerHTML=`
    <h3>Q${index+1}: ${item.q}</h3>
    ${item.options.map((opt,i)=>`
      <label>
        <input type="radio" name="q${index}" value="${i}"> ${opt}
      </label>
    `).join('')}
    <hr>
  `;
  container.appendChild(qDiv);
});

const submitBtn=document.createElement('button');
submitBtn.textContent="Submit Quiz";

submitBtn.onclick=function(){
  let score=0;
  reactQuiz.forEach((item,index)=>{
    const radios=document.getElementsByName('q'+index);
    for(let i=0;i<radios.length;i++){
      if(radios[i].checked && parseInt(radios[i].value)===item.answer){
        score++;
      }
    }
  });
  alert("Your React Quiz Score: "+score+" / "+reactQuiz.length);
};

container.appendChild(submitBtn);
</script>
</body>
</html>
