<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scala Quiz</title>
<link rel="stylesheet" href="style.css">
<style>
body{font-family:'Poppins',sans-serif;padding:20px;background:#f5f5f5;}
.container{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
h1{text-align:center;} h3{margin-top:20px;} label{display:block;margin:5px 0;}
button{margin-top:20px;padding:10px 20px;font-size:16px;border-radius:5px;background:#4CAF50;color:white;border:none;cursor:pointer;}
a{display:inline-block;margin-bottom:20px;color:#333;text-decoration:none;}
</style>
</head>
<body>
<div class="container">
<a href="quiz.html">← Back to Quiz Selection</a>
<h1>Scala Quiz</h1>
<div id="quizContainer"></div>
</div>
<script>
const scalaQuiz=[
{q:"Scala developed by?",options:["Martin Odersky","Guido van Rossum","James Gosling","Dennis Ritchie"],answer:0},
{q:"Scala is ___ language?",options:["Object-Oriented & Functional","Scripting","Compiled","Procedural"],answer:0},
{q:"File extension?",options:[".scala",".sc",".scl",".sl"],answer:0},
{q:"Immutable variable keyword?",options:["val","var","let","const"],answer:0},
{q:"Mutable variable keyword?",options:["var","val","let","const"],answer:0},
{q:"Function definition keyword?",options:["def","func","function","fun"],answer:0},
{q:"To define class?",options:["class","object","struct","type"],answer:0},
{q:"Singleton object keyword?",options:["object","class","singleton","module"],answer:0},
{q:"Loop keyword for range?",options:["for","while","do","repeat"],answer:0},
{q:"Conditional keyword?",options:["if","match","switch","case"],answer:0},
{q:"Pattern matching keyword?",options:["match","switch","case","if"],answer:0},
{q:"To define trait?",options:["trait","interface","abstract","class"],answer:0},
{q:"To define generic?",options:["[T]","<T>","{T}","(T)"],answer:0},
{q:"String interpolation?",options:["s\"Hello $name\"","$\"Hello $name\"","`Hello $name`","\"Hello $name\""],answer:0},
{q:"Option type in Scala?",options:["Option","Optional","Maybe","Some"],answer:0},
{q:"Immutable collection?",options:["List","Array","Vector","Map"],answer:0},
{q:"Mutable collection?",options:["ArrayBuffer","List","Vector","Map"],answer:0},
{q:"Logical AND?",options:["&&","and","&","||"],answer:0},
{q:"Logical OR?",options:["||","or","|","&&"],answer:0},
{q:"Run Scala code?",options:["scala filename.scala","scalac filename.scala","java filename.scala","run scala"],answer:0}
];
const container=document.getElementById('quizContainer');
scalaQuiz.forEach((item,index)=>{
const qDiv=document.createElement('div');
qDiv.innerHTML=`<h3>Q${index+1}: ${item.q}</h3>${item.options.map((opt,i)=>`<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label>`).join('')}<hr>`;
container.appendChild(qDiv);
});
const submitBtn=document.createElement('button');
submitBtn.textContent="Submit Quiz";
submitBtn.onclick=()=>{
let score=0;
scalaQuiz.forEach((item,index)=>{
const radios=document.getElementsByName('q'+index);
radios.forEach(r=>{if(r.checked && parseInt(r.value)===item.answer)score++;});
});
alert(`Your Scala Quiz Score: ${score} / ${scalaQuiz.length}`);
};
container.appendChild(submitBtn);
</script>
</body>
</html>
