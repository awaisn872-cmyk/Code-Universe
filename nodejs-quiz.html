<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Node.js Quiz</title>
<link rel="stylesheet" href="style.css">
<style>
body{font-family:'Poppins',sans-serif;padding:20px;background:#f5f5f5;}
.container{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
h1{text-align:center;} h3{margin-top:20px;} label{display:block;margin:5px 0;}
button{margin-top:20px;padding:10px 20px;font-size:16px;border-radius:5px;background:#4CAF50;color:white;border:none;cursor:pointer;}
a{display:inline-block;margin-bottom:20px;color:#333;text-decoration:none;}
</style>
</head>
<body>
<div class="container">
<a href="quiz.html">← Back to Quiz Selection</a>
<h1>Node.js Quiz</h1>
<div id="quizContainer"></div>
</div>
<script>
const nodeQuiz=[
{q:"Node.js developed by?",options:["Ryan Dahl","Brendan Eich","Guido van Rossum","James Gosling"],answer:0},
{q:"Node.js is ___?",options:["JavaScript runtime","Language","Framework","Library"],answer:0},
{q:"Node.js built on?",options:["V8 Engine","SpiderMonkey","Java VM","Python VM"],answer:0},
{q:"File extension?",options:[".js",".ts",".node",".jsx"],answer:0},
{q:"To create server?",options:["http.createServer()","server()","createServer()","new Server()"],answer:0},
{q:"To include module?",options:["require()","import()","include()","use()"],answer:0},
{q:"Package manager?",options:["npm","pip","gem","cargo"],answer:0},
{q:"Default event loop?",options:["Single-threaded","Multi-threaded","None","Both"],answer:0},
{q:"Global object?",options:["global","window","this","self"],answer:0},
{q:"Callback function usage?",options:["Async handling","Sync","Blocking","Loop"],answer:0},
{q:"Promise keyword?",options:["Promise","Async","Await","then"],answer:0},
{q:"Async/Await supported?",options:["Yes","No","Sometimes","None"],answer:0},
{q:"To read file?",options:["fs.readFile()","readFile()","File.read()","read()"],answer:0},
{q:"To write file?",options:["fs.writeFile()","writeFile()","File.write()","write()"],answer:0},
{q:"EventEmitter class?",options:["Yes","No","Maybe","None"],answer:0},
{q:"npm init command?",options:["npm init","npm start","npm create","npm new"],answer:0},
{q:"To install package?",options:["npm install package","npm add package","npm get package","npm include package"],answer:0},
{q:"To start Node server?",options:["node filename.js","npm start","node start","node run"],answer:0},
{q:"Environment variable access?",options:["process.env","env","system.env","os.env"],answer:0},
{q:"Default port for HTTP server?",options:["3000","8080","80","5000"],answer:0}
];
const container=document.getElementById('quizContainer');
nodeQuiz.forEach((item,index)=>{
const qDiv=document.createElement('div');
qDiv.innerHTML=`<h3>Q${index+1}: ${item.q}</h3>${item.options.map((opt,i)=>`<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label>`).join('')}<hr>`;
container.appendChild(qDiv);
});
const submitBtn=document.createElement('button');
submitBtn.textContent="Submit Quiz";
submitBtn.onclick=()=>{
let score=0;
nodeQuiz.forEach((item,index)=>{
const radios=document.getElementsByName('q'+index);
radios.forEach(r=>{if(r.checked && parseInt(r.value)===item.answer)score++;});
});
alert(`Your Node.js Quiz Score: ${score} / ${nodeQuiz.length}`);
};
container.appendChild(submitBtn);
</script>
</body>
</html>
